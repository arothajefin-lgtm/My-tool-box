name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Prepare Web Directory
        run: |
          mkdir -p www
          cp -r *.html *.js *.css *.png www/ 2>/dev/null || true

      - name: Install Dependencies
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          # താഴെയുള്ള വരി ശ്രദ്ധിക്കുക, സ്പേസ് കൃത്യമാണ്
          npx cap init "My Tool Box" com.arothajefin.toolbox --web-dir www
          npx cap add android

      - name: Generate App Icons
        run: |
          mkdir -p assets
          cp icon.png assets/icon-only.png 2>/dev/null || true
          cp icon.png assets/icon.png 2>/dev/null || true
          npx capacitor-assets generate --android

      - name: Build APK
        run: |
          npx cap copy android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
