name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare Web Directory
        run: |
          # ഒരു www ഫോൾഡർ ഉണ്ടാക്കി എല്ലാ HTML/JS/PNG ഫയലുകളും അതിലേക്ക് മാറ്റുന്നു
          mkdir www
          cp -r *.html *.js *.css *.png www/ 2>/dev/null || true

      - name: Install Dependencies
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          # web-dir ആയി 'www' നൽകുന്നു
          npx cap init "My Tool Box" com.arothajefin.myapp --web-dir www
          npx cap add android

      - name: Generate App Icons
        run: |
          if [ -f "icon.png" ]; then
            npx capacitor-assets generate --android --icon-path icon.png
          else
            echo "icon.png not found"
          fi

      - name: Build APK
        run: |
          npx cap copy android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
